<!DOCTYPE html>
<html>
<head>
    <title>Quản lý sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">

                <span class="navbar-brand">
                    🛒 Secure Shop Admin
                </span>

             <div>

                    <a href="/dashboard"
                        class="btn btn-outline-light btn-sm">

                        Dashboard

                    </a>

                    <a href="/logout"
                        class="btn btn-danger btn-sm">

                        Đăng xuất

                    </a>

            </div>

            </div>
</nav>

        .product-card{
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            background: white;
        }

        .product-card:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .product-img{
            height: 180px;
            object-fit: cover;
        }

        .price-badge{
            background: #ff5722;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .admin-badge{
            background: #198754;
            color: white;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
        }
    </style>

</head>

<body>

<div class="container mt-4">

    <h1 class="mb-3">🔧 Quản lý sản phẩm</h1>
    <div class="alert alert-primary">

        Tổng số sản phẩm:
        <strong>{{ products|length }}</strong>

    </div>
    <a href="/admin/add_product"
       class="btn btn-success mb-4">
       ➕ Thêm sản phẩm
    </a>

    <div class="row">

        {% for p in products %}

        <div class="col-md-4 mb-4">

            <div class="card product-card">

                <img src="/static/images/{{ p[4] }}"
                     class="card-img-top product-img">

                <div class="card-body">

                    <span class="admin-badge">ID: {{ p[0] }}</span>

                    <h5 class="mt-2">
                        {{ p[1] }}
                    </h5>

                    <p class="text-muted">
                        {{ p[3] }}
                    </p>

                    <div class="price-badge">
                        {{ "{:,}".format(p[2]) }} VNĐ
                    </div>
                    <div class="mt-3">
                        <a href="/admin/edit_product/{{ p[0] }}"
                            class="btn btn-warning btn-sm">

                            ✏️ Sửa

                        </a>
                        <form method="POST"
                            action="/admin/delete_product/{{ p[0] }}"
                            style="display:inline;">

                            <input type="hidden"
                                name="csrf_token"
                                value="{{ csrf_token() }}">

                            <button type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">

                                🗑 Xóa

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
