<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6f8;
        }

        .card-box{
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card-box:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .btn-shop{
            border-radius: 10px;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-3">👋 Xin chào {{ username }}</h2>

    <p>
        Vai trò:
        <span class="badge bg-dark">{{ role }}</span>
    </p>

    {% if role == 'admin' %}

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>🛒 Quản lý sản phẩm</h5>
                <p>Xem / thêm / quản lý sản phẩm</p>
                <a href="/admin/products" class="btn btn-primary btn-shop">
                    Đi tới
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>➕ Thêm sản phẩm</h5>
                <p>Thêm sản phẩm mới vào shop</p>
                <a href="/admin/add_product" class="btn btn-success btn-shop">
                    Thêm
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>📦 Giỏ hàng</h5>
                <p>Kiểm tra đơn hàng khách</p>
                <a href="/cart" class="btn btn-warning btn-shop">
                    Xem
                </a>
            </div>
        </div>

    </div>

    {% else %}

    <div class="alert alert-info mt-4">
        Bạn là user thường. Chỉ có quyền mua hàng.
    </div>

    {% endif %}

    <a href="/logout" class="btn btn-danger mt-4">
        Đăng xuất
    </a>

</div>

</body>
</html>
