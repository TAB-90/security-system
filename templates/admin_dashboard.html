<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:
            linear-gradient(
            rgba(0,0,0,0.5),
            rgba(0,0,0,0.5)
        ),
        url("/static/images/bg.jpg");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
}

        .dashboard-card{
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .dashboard-card:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .admin-header{
            background: linear-gradient(135deg,#ee4d2d,#ff7337);
            color:white;
            padding:30px;
            border-radius:15px;
            margin-bottom:30px;
        }

        .btn-shop{
            border-radius:10px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <div class="admin-header">

        <h1>⚙️ Admin Dashboard</h1>

        <p class="mb-0">
            Hệ thống quản lý cửa hàng
        </p>

    </div>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card dashboard-card">

                <div class="card-body">

                    <h4>📦 Sản phẩm</h4>

                    <p>
                        Quản lý danh sách sản phẩm
                    </p>

                    <a href="/admin/products"
                       class="btn btn-primary btn-shop">
                        Quản lý sản phẩm
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card dashboard-card">

                <div class="card-body">

                    <h4>➕ Thêm sản phẩm</h4>

                    <p>
                        Thêm sản phẩm mới vào hệ thống
                    </p>

                    <a href="/admin/add_product"
                       class="btn btn-success btn-shop">
                        Thêm sản phẩm
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card dashboard-card">

                <div class="card-body">

                    <h4>🛒 Giỏ hàng</h4>

                    <p>
                        Xem đơn hàng của khách
                    </p>

                    <a href="/cart"
                       class="btn btn-warning btn-shop">
                        Xem giỏ hàng
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
