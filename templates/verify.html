<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            /* 🌈 background gradient đẹp */
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card{
            background:white;
            width:380px;
            padding:30px;
            border-radius:16px;
            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,0.2);

            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn{
            from{transform:translateY(20px); opacity:0;}
            to{transform:translateY(0); opacity:1;}
        }

        h2{
            margin-bottom:10px;
            color:#333;
        }

        p{
            color:#666;
            font-size:14px;
            margin-bottom:20px;
        }

        /* OTP input */
        .otp-container{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:20px;
        }

        .otp-box{
            width:45px;
            height:50px;
            text-align:center;
            font-size:20px;
            border:2px solid #ddd;
            border-radius:8px;
            outline:none;
            transition:0.2s;
        }

        .otp-box:focus{
            border-color:#667eea;
            transform:scale(1.05);
        }

        button{
            width:100%;
            padding:12px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            margin-top:10px;
            transition:0.3s;
        }

        button:hover{
            background:#5a67d8;
        }

        #timer{
            color:#e53e3e;
            font-weight:bold;
        }

        #resend{
            display:none;
            margin-top:15px;
            color:#667eea;
            text-decoration:none;
            font-weight:bold;
        }

        #resend:hover{
            text-decoration:underline;
        }

        .small{
            font-size:13px;
            color:#888;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🔐 Xác thực OTP</h2>
    <p>Nhập mã đã gửi về email của bạn</p>
    {% if error %}
        <div style="color:red; margin-bottom:10px;">
            {{ error }}
        </div>
    {% endif %}
    <form method="POST">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- OTP 6 ô -->
        <div class="otp-container">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
        </div>

        <input type="hidden" name="otp" id="otp">

        <button id="submitBtn">Xác nhận</button>
    </form>

    <p class="small">OTP hết hạn sau <span id="timer">60</span> giây</p>

    <a href="/resend_otp" id="resend">🔁 Gửi lại OTP</a>

</div>

<script>

// ================= OTP AUTO =================
const inputs = document.querySelectorAll(".otp-box");

inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        if(input.value && index < inputs.length - 1){
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if(e.key === "Backspace" && !input.value && index > 0){
            inputs[index - 1].focus();
        }
    });

});

// gộp OTP
document.querySelector("form").addEventListener("submit", function(){
    let otp = "";
    inputs.forEach(i => otp += i.value);
    document.getElementById("otp").value = otp;
});

// ================= TIMER =================
let timeLeft = 60;

let timer = setInterval(() => {

    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if(timeLeft <= 0){

        clearInterval(timer);

        inputs.forEach(i => i.disabled = true);
        document.getElementById("submitBtn").disabled = true;

        document.getElementById("resend").style.display = "inline-block";
    }

}, 1000);

</script>

</body>
</html>
